<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users | Hauers Admin</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="/js/theme-toggle.js"></script>
</head>
<body data-role="admin">

  <div id="navbar-placeholder"></div>

  <div class="app-shell sidebar-collapsed">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div id="sidebar-placeholder"></div>

    <main class="page-content">

      <!-- ── Page header ── -->
      <header class="page-header">
        <div>
          <h1 class="page-title">Users</h1>
          <p class="page-subtitle">Manage reviewee accounts and track progress</p>
        </div>
      </header>

      <!-- ── KPI tiles ── -->
      <div class="dash-grid dash-grid--4col">

        <div class="dash-card admin-kpi-card">
          <div class="admin-kpi-header">
            <span class="card-label">Total Reviewees</span>
            <span class="admin-kpi-icon admin-kpi-icon--blue">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </span>
          </div>
          <div class="admin-kpi-val" id="kpi-total">—</div>
          <p class="card-sub">registered learners</p>
        </div>

        <div class="dash-card admin-kpi-card">
          <div class="admin-kpi-header">
            <span class="card-label">Verified</span>
            <span class="admin-kpi-icon admin-kpi-icon--green">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </span>
          </div>
          <div class="admin-kpi-val" id="kpi-verified">—</div>
          <p class="card-sub">email confirmed</p>
        </div>

        <div class="dash-card admin-kpi-card">
          <div class="admin-kpi-header">
            <span class="card-label">Professional</span>
            <span class="admin-kpi-icon admin-kpi-icon--orange">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
            </span>
          </div>
          <div class="admin-kpi-val" id="kpi-professional">—</div>
          <p class="card-sub">exam track</p>
        </div>

        <div class="dash-card admin-kpi-card">
          <div class="admin-kpi-header">
            <span class="card-label">Sub-professional</span>
            <span class="admin-kpi-icon admin-kpi-icon--pink">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            </span>
          </div>
          <div class="admin-kpi-val" id="kpi-subpro">—</div>
          <p class="card-sub">exam track</p>
        </div>

      </div>

      <!-- ── Toolbar (search + filters) ── -->
      <div class="rm-filter-bar" style="margin-bottom:0.75rem">
        <div class="rm-filter-row">
          <span class="rm-filter-label">Level</span>
          <button class="rm-filter-chip active" data-filter="level" data-val="all">All</button>
          <button class="rm-filter-chip" data-filter="level" data-val="Professional">Professional</button>
          <button class="rm-filter-chip" data-filter="level" data-val="Sub-professional">Sub-professional</button>
        </div>
        <div class="rm-filter-row">
          <span class="rm-filter-label">Status</span>
          <button class="rm-filter-chip active" data-filter="status" data-val="all">All</button>
          <button class="rm-filter-chip" data-filter="status" data-val="verified">Verified</button>
          <button class="rm-filter-chip" data-filter="status" data-val="pending">Pending</button>
        </div>
      </div>

      <!-- ── Search input ── -->
      <div style="margin-bottom:1rem;position:relative;max-width:480px">
        <input
          type="search"
          id="user-search"
          placeholder="Search by name or email…"
          class="sw-input"
          style="width:100%;padding:0.6rem 1rem 0.6rem 2.5rem;border-radius:10px;border:1px solid var(--border-subdued);background:var(--input-bg);color:var(--text-main);font-size:0.875rem;"
          autocomplete="off"
        />
        <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-subdued)" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>

      <!-- ── Users table ── -->
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Exam Level</th>
              <th>Readiness</th>
              <th>Streak</th>
              <th>Joined</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-subdued)">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <p id="users-result-msg" style="font-size:0.78rem;color:var(--text-subdued);margin-bottom:0.5rem"></p>

    </main>
  </div>

  <script src="/js/admin-shell.js"></script>
  <script>
  (async () => {

    /* ── Fetch users ─────────────────────────────────────── */
    let allUsers = [];
    try {
      const r = await fetch('/admin/api/users');
      if (!r.ok) return;
      const data = await r.json();
      allUsers = data.users || [];
    } catch (_) { return; }

    /* ── KPI tiles ───────────────────────────────────────── */
    const setKpi = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    setKpi('kpi-total',        allUsers.length);
    setKpi('kpi-verified',     allUsers.filter(u => u.isVerified).length);
    setKpi('kpi-professional', allUsers.filter(u => u.examLevel === 'Professional').length);
    setKpi('kpi-subpro',       allUsers.filter(u => u.examLevel === 'Sub-professional').length);

    /* ── Helpers ─────────────────────────────────────────── */
    function initials(u)  { return (u.firstName[0] + u.lastName[0]).toUpperCase(); }
    function fmtDate(d)   { return d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—'; }
    function readinessClass(s) { if (s == null) return ''; if (s < 50) return ' low'; if (s < 70) return ' warn'; return ''; }

    /* ── Render ──────────────────────────────────────────── */
    const tbody    = document.getElementById('users-tbody');
    const resultEl = document.getElementById('users-result-msg');

    function renderUsers(users) {
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">🔍</div><p>No users match your filters.</p></div></td></tr>';
        if (resultEl) resultEl.textContent = '';
        return;
      }

      tbody.innerHTML = users.map(u => {
        const score = u.readinessScore;
        const scoreLabel = score != null ? score + '%' : '—';
        const fillPct    = score != null ? score : 0;
        const badge = u.isVerified
          ? `<span class="status-badge status-badge--verified">Verified</span>`
          : `<span class="status-badge status-badge--pending">Pending</span>`;

        return `
          <tr onclick="location.href='/admin/users/${u.id}'" style="cursor:pointer">
            <td>
              <div class="tbl-name-cell">
                <span class="tbl-avatar">${initials(u)}</span>
                <div>
                  <span class="tbl-name">${u.firstName} ${u.lastName}</span>
                  <span class="tbl-email">${u.email}</span>
                </div>
              </div>
            </td>
            <td>${u.examLevel || '—'}</td>
            <td>
              <div class="readiness-cell">
                <span style="font-size:0.82rem;font-weight:600;min-width:32px">${scoreLabel}</span>
                <div class="readiness-mini-bar">
                  <div class="readiness-mini-fill${readinessClass(score)}" style="width:${fillPct}%"></div>
                </div>
              </div>
            </td>
            <td>${u.streak ? u.streak + ' day' + (u.streak !== 1 ? 's' : '') : '—'}</td>
            <td>${fmtDate(u.joinedAt)}</td>
            <td>${badge}</td>
            <td><a class="tbl-view-btn" href="/admin/users/${u.id}" onclick="event.stopPropagation()">View →</a></td>
          </tr>`;
      }).join('');

      if (resultEl) {
        resultEl.textContent = users.length < allUsers.length
          ? `Showing ${users.length} of ${allUsers.length} users`
          : '';
      }
    }

    /* ── Filter state ────────────────────────────────────── */
    let activeLevel  = 'all';
    let activeStatus = 'all';
    let searchQuery  = '';

    function applyFilters() {
      return allUsers.filter(u => {
        const byLevel  = activeLevel  === 'all' || u.examLevel  === activeLevel;
        const byStatus = activeStatus === 'all'
          || (activeStatus === 'verified' && u.isVerified)
          || (activeStatus === 'pending'  && !u.isVerified);
        const q        = searchQuery.trim().toLowerCase();
        const bySearch = !q
          || `${u.firstName} ${u.lastName}`.toLowerCase().includes(q)
          || u.email.toLowerCase().includes(q);
        return byLevel && byStatus && bySearch;
      });
    }

    /* ── Initial render ──────────────────────────────────── */
    renderUsers(allUsers);

    /* ── Filter chips ────────────────────────────────────── */
    document.querySelectorAll('.rm-filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.filter;
        document.querySelectorAll(`.rm-filter-chip[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (type === 'level')  activeLevel  = btn.dataset.val;
        if (type === 'status') activeStatus = btn.dataset.val;
        renderUsers(applyFilters());
      });
    });

    /* ── Search input ────────────────────────────────────── */
    const searchEl = document.getElementById('user-search');
    if (searchEl) {
      let debounce;
      searchEl.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          searchQuery = searchEl.value;
          renderUsers(applyFilters());
        }, 220);
      });
    }

  })();
  </script>

</body>
</html>
